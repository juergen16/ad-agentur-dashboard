name: Daily Dashboard Update

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC = 08:00 MESZ
    - cron: '0 12 * * *' # 12:00 UTC = 14:00 MESZ (Backup-Update)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install curl
        run: sudo apt-get update && sudo apt-get install -y curl
      
      - name: Generate Dashboard
        id: generate
        run: |
          python3 generate_dashboard.py
          echo "status=success" >> $GITHUB_OUTPUT
        continue-on-error: true
      
      - name: Check Generation Status
        if: steps.generate.outputs.status != 'success'
        run: |
          echo "::error::Dashboard generation failed!"
          exit 1
      
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-update: $(date '+%Y-%m-%d %H:%M')"
          git push
      
      - name: Verify Deployment
        run: |
          sleep 5
          curl -s https://adagentur.github.io/ad-agentur-dashboard/ | head -20
          echo "✅ Dashboard deployed successfully"