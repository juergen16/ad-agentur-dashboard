name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 8 * * *'  # Jeden Tag um 08:00 UTC
  workflow_dispatch:  # Manuelles Starten möglich

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install requests
        
    - name: Generate Dashboard
      run: |
        python3 << 'EOF'
        import subprocess
        import csv
        import re
        from datetime import datetime
        
        def parse_euro(value):
            try:
                if not value:
                    return 0.0
                clean = str(value).replace('€', '').replace(' ', '').replace('.', '').replace(',', '.').strip()
                return float(clean)
            except:
                return 0.0
        
        def parse_differenz(value):
            if not value:
                return 0.0
            val_str = str(value).strip()
            if '€' in val_str:
                return parse_euro(val_str)
            if re.match(r'^[\-\d.,]+$', val_str):
                return parse_euro(val_str)
            return 0.0
        
        def format_euro(value):
            return f"€ {value:,.2f}".replace(",", "X").replace(".", ",").replace("X", ".")
        
        # Sheet Daten laden
        sheet_id = '1qTgbNCIaHtvGGXHlvXf0J2cnVh-F5yt4BTc2xgiOM_0'
        gid = '1298332214'
        csv_url = f'https://docs.google.com/spreadsheets/d/{sheet_id}/export?format=csv&gid={gid}'
        
        result = subprocess.run(['curl', '-sL', csv_url], capture_output=True, text=True, timeout=30)
        reader = csv.reader(result.stdout.splitlines())
        rows = list(reader)
        
        # Finde Header
        header_idx = 0
        for i, row in enumerate(rows):
            if len(row) > 0 and 'Google CID' in row[0]:
                header_idx = i
                break
        
        data = []
        abo_kunden = []
        rechnungen_faellig = []
        
        for row in rows[header_idx + 2:]:
            if len(row) < 14:
                continue
            
            kunde = row[1] if len(row) > 1 else ''
            status = row[13] if len(row) > 13 else ''
            billing_status = row[12] if len(row) > 12 else ''
            
            if 'ABO' in kunde.upper():
                budget = parse_euro(row[7] if len(row) > 7 else '0')
                differenz = parse_differenz(row[11] if len(row) > 11 else '0')
                abo_kunden.append({'kunde': kunde, 'budget': budget, 'differenz': differenz})
                continue
            
            if status and 'Aktiv' in status:
                budget = parse_euro(row[7] if len(row) > 7 else '0')
                gesamtkosten = parse_euro(row[6] if len(row) > 6 else '0')
                daily_28 = parse_euro(row[19] if len(row) > 19 else '0')
                ideal = parse_euro(row[20] if len(row) > 20 else '0')
                differenz_spalte_l = parse_differenz(row[11] if len(row) > 11 else '0')
                differenz_berechnet = daily_28 - ideal
                
                if 'Rechnung' in str(billing_status):
                    rechnungen_faellig.append({'kunde': kunde, 'rechnungswert': budget})
                
                data.append({
                    'kunde': kunde,
                    'budget': budget,
                    'differenz': differenz_spalte_l,
                    'differenz_berechnet': differenz_berechnet,
                    'gesamtkosten': gesamtkosten,
                    'daily_28': daily_28,
                    'ideal': ideal
                })
        
        # Sortieren
        mit_guthaben = sorted([d for d in data if d['differenz_berechnet'] < 0], key=lambda x: x['differenz_berechnet'])
        mit_minus = sorted([d for d in data if d['differenz_berechnet'] > 0], key=lambda x: x['differenz_berechnet'], reverse=True)
        top5 = sorted(data, key=lambda x: x['gesamtkosten'], reverse=True)[:5]
        
        gesamt_kosten = sum(d['gesamtkosten'] for d in data)
        gesamt_overspend = sum(abs(d['differenz_berechnet']) for d in mit_minus) * 30
        gesamt_underspend = sum(abs(d['differenz_berechnet']) for d in mit_guthaben) * 30
        
        timestamp = datetime.now().strftime("%d.%m.%Y %H:%M")
        
        # HTML generieren
        html = f'''<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Zahlungsstatus Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap');
        * {{ margin: 0; padding: 0; box-sizing: border-box; }}
        body {{ font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }}
        #login {{ position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #1a1a2e, #16213e); display: flex; align-items: center; justify-content: center; z-index: 1000; }}
        .login-box {{ background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 48px; text-align: center; max-width: 400px; width: 90%; }}
        .login-box h1 {{ font-size: 1.5rem; margin-bottom: 20px; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }}
        .login-box input {{ width: 100%; padding: 16px; border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; background: rgba(0,0,0,0.3); color: white; font-size: 1rem; margin-bottom: 16px; }}
        .login-box button {{ width: 100%; padding: 16px; border: none; border-radius: 12px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; font-size: 1rem; font-weight: 700; cursor: pointer; }}
        .error {{ color: #ef4444; margin-top: 12px; display: none; }}
        #dashboard {{ display: none; padding: 30px 20px; max-width: 1400px; margin: 0 auto; }}
        header {{ text-align: center; padding: 50px 30px; background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 20px; margin-bottom: 25px; border: 1px solid rgba(99, 102, 241, 0.2); }}
        h1 {{ font-size: 2.8rem; font-weight: 900; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }}
        .timestamp {{ color: #6b7280; font-size: 0.9rem; }}
        .kpi-grid {{ display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 25px; }}
        .kpi-card {{ background: linear-gradient(145deg, #1f1f2e, #1a1a2e); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; position: relative; overflow: hidden; }}
        .kpi-card::before {{ content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }}
        .kpi-card.blue::before {{ background: linear-gradient(90deg, #6366f1, #8b5cf6); }}
        .kpi-card.orange::before {{ background: linear-gradient(90deg, #f97316, #fb923c); }}
        .kpi-card.green::before {{ background: linear-gradient(90deg, #10b981, #34d399); }}
        .kpi-label {{ font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em; color: #9ca3af; margin-bottom: 10px; }}
        .kpi-value {{ font-size: 2.5rem; font-weight: 900; color: #fff; line-height: 1; margin-bottom: 4px; white-space: nowrap; }}
        .kpi-subtext {{ font-size: 0.8rem; color: #6b7280; }}
        .kpi-total {{ font-size: 1.1rem; font-weight: 800; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.08); white-space: nowrap; }}
        .kpi-total.orange {{ color: #f97316; }}
        .kpi-total.green {{ color: #10b981; }}
        .section {{ background: linear-gradient(145deg, #1f1f2e, #1a1a2e); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; margin-bottom: 20px; }}
        .section-header {{ display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }}
        .section-title {{ font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }}
        .badge {{ padding: 6px 14px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; }}
        .badge-danger {{ background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }}
        .badge-success {{ background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }}
        .badge-info {{ background: rgba(99, 102, 241, 0.2); color: #6366f1; border: 1px solid rgba(99, 102, 241, 0.3); }}
        table {{ width: 100%; border-collapse: collapse; font-size: 0.9rem; }}
        th {{ text-align: left; padding: 12px 10px; color: #9ca3af; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid rgba(255,255,255,0.1); white-space: nowrap; }}
        td {{ padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); white-space: nowrap; }}
        tr:hover {{ background: rgba(99, 102, 241, 0.05); }}
        .text-right {{ text-align: right; }}
        .mono {{ font-family: 'SF Mono', monospace; font-weight: 700; }}
        .positive {{ color: #10b981; font-weight: 800; }}
        .negative {{ color: #ef4444; font-weight: 800; }}
        .trophy {{ font-size: 1.4rem; }}
        .total-costs {{ text-align: right; padding: 16px; background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.05)); border-radius: 12px; margin-top: 16px; border: 1px solid rgba(99, 102, 241, 0.2); }}
        .total-costs-label {{ color: #9ca3af; font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; }}
        .total-costs-value {{ font-size: 1.5rem; font-weight: 900; color: #6366f1; font-family: monospace; white-space: nowrap; }}
        .abo-section {{ background: linear-gradient(145deg, rgba(99, 102, 241, 0.08), rgba(99, 102, 241, 0.03)); border: 1px solid rgba(99, 102, 241, 0.2); }}
    </style>
</head>
<body>
    <div id="login">
        <div class="login-box">
            <h1>🔐 Zahlungsstatus Dashboard</h1>
            <input type="password" id="pw" placeholder="Passwort" onkeypress="if(event.key==='Enter')check()">
            <button onclick="check()">Anmelden</button>
            <div class="error" id="err">Falsches Passwort</div>
        </div>
    </div>
    <div id="dashboard">
        <header>
            <h1>Zahlungsstatus</h1>
            <p class="timestamp">🕐 Letztes Update: {timestamp}</p>
        </header>
        <div class="kpi-grid">
            <div class="kpi-card blue">
                <div class="kpi-label">Aktive Kunden</div>
                <div class="kpi-value">{len(data)}</div>
                <div class="kpi-subtext">Gesamt</div>
            </div>
            <div class="kpi-card blue">
                <div class="kpi-label">Monatlicher Umsatz</div>
                <div class="kpi-value">{format_euro(sum(d['budget'] for d in data))}</div>
                <div class="kpi-subtext">Aktive Kunden</div>
            </div>
            <div class="kpi-card orange">
                <div class="kpi-label">⚠️ Overspend</div>
                <div class="kpi-value">{len(mit_minus)}</div>
                <div class="kpi-subtext">Über Budget</div>
                <div class="kpi-total orange">{format_euro(gesamt_overspend)}</div>
            </div>
            <div class="kpi-card green">
                <div class="kpi-label">✓ Underspend</div>
                <div class="kpi-value">{len(mit_guthaben)}</div>
                <div class="kpi-subtext">Unter Budget</div>
                <div class="kpi-total green">{format_euro(gesamt_underspend)}</div>
            </div>
        </div>
'''
        
        # Rechnungen fällig
        html += f'<div class="section"><div class="section-header"><h2 class="section-title">🚨 Rechnungen fällig</h2><span class="badge badge-danger">{len(rechnungen_faellig)}</span></div><table><thead><tr><th>Kunde</th><th class="text-right">Rechnungswert</th></tr></thead><tbody>'
        if rechnungen_faellig:
            for r in rechnungen_faellig:
                html += f'<tr><td>{r["kunde"]}</td><td class="text-right mono">{format_euro(r["rechnungswert"])}</td></tr>'
        else:
            html += '<tr><td colspan="2" style="text-align:center;color:#6b7280;padding:20px;">✓ Keine Rechnungen fällig</td></tr>'
        html += '</tbody></table></div>'
        
        # Overspend
        html += f'<div class="section"><div class="section-header"><h2 class="section-title">⚠️ Overspend (über Budget)</h2><span class="badge badge-danger">{len(mit_minus)} Kunden</span></div><table><thead><tr><th>Kunde</th><th class="text-right">Soll</th><th class="text-right">Ist</th><th class="text-right">Abweichung</th></tr></thead><tbody>'
        for d in mit_minus:
            monat_diff = d['differenz_berechnet'] * 30
            html += f'<tr><td>{d["kunde"]}</td><td class="text-right mono">{format_euro(d["ideal"])}</td><td class="text-right mono">{format_euro(d["daily_28"])}</td><td class="text-right mono negative">{format_euro(monat_diff)}</td></tr>'
        if not mit_minus:
            html += '<tr><td colspan="4" style="text-align:center;color:#6b7280;padding:20px;">✓ Keine Overspend</td></tr>'
        html += '</tbody></table></div>'
        
        # Underspend
        html += f'<div class="section"><div class="section-header"><h2 class="section-title">✓ Underspend (unter Budget)</h2><span class="badge badge-success">{len(mit_guthaben)} Kunden</span></div><table><thead><tr><th>Kunde</th><th class="text-right">Soll</th><th class="text-right">Ist</th><th class="text-right">Abweichung</th></tr></thead><tbody>'
        for d in mit_guthaben:
            monat_diff = abs(d['differenz_berechnet']) * 30
            html += f'<tr><td>{d["kunde"]}</td><td class="text-right mono">{format_euro(d["ideal"])}</td><td class="text-right mono">{format_euro(d["daily_28"])}</td><td class="text-right mono positive">+{format_euro(monat_diff)}</td></tr>'
        if not mit_guthaben:
            html += '<tr><td colspan="4" style="text-align:center;color:#6b7280;padding:20px;">- Keine Underspend</td></tr>'
        html += '</tbody></table></div>'
        
        # Alle Kunden
        html += f'<div class="section"><div class="section-header"><h2 class="section-title">📊 Alle aktiven Kunden</h2><span class="badge badge-info">{len(data)}</span></div><table><thead><tr><th>Kunde</th><th class="text-right">Budget</th><th class="text-right">Differenz</th></tr></thead><tbody>'
        for d in sorted(data, key=lambda x: x['kunde']):
            diff_class = 'positive' if d['differenz'] > 0 else 'negative' if d['differenz'] < 0 else ''
            diff_text = f'+{format_euro(d["differenz"])}' if d['differenz'] > 0 else format_euro(d['differenz'])
            html += f'<tr><td>{d["kunde"]}</td><td class="text-right mono">{format_euro(d["budget"])}</td><td class="text-right mono {diff_class}">{diff_text}</td></tr>'
        html += '</tbody></table></div>'
        
        # ABO
        html += f'<div class="section abo-section"><div class="section-header"><h2 class="section-title">🔄 ABO-Kunden</h2><span class="badge badge-info">{len(abo_kunden)}</span></div><table><thead><tr><th>Kunde</th><th class="text-right">Budget</th><th class="text-right">Differenz</th></tr></thead><tbody>'
        for abo in abo_kunden:
            diff_class = 'positive' if abo['differenz'] > 0 else 'negative' if abo['differenz'] < 0 else ''
            diff_text = f'+{format_euro(abo["differenz"])}' if abo['differenz'] > 0 else format_euro(abo['differenz'])
            html += f'<tr><td>{abo["kunde"]}</td><td class="text-right mono">{format_euro(abo["budget"])}</td><td class="text-right mono {diff_class}">{diff_text}</td></tr>'
        html += '</tbody></table></div>'
        
        # Top 5
        html += f'<div class="section"><div class="section-header"><h2 class="section-title">🏆 Top 5 Kunden (nach Gesamtkosten)</h2></div><table><thead><tr><th>Rang</th><th>Kunde</th><th class="text-right">Gesamtkosten</th><th class="text-right">Monatliches Budget</th></tr></thead><tbody>'
        trophies = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣']
        for i, t in enumerate(top5):
            html += f'<tr><td><span class="trophy">{trophies[i]}</span></td><td>{t["kunde"]}</td><td class="text-right mono">{format_euro(t["gesamtkosten"])}</td><td class="text-right mono">{format_euro(t["budget"])}</td></tr>'
        html += f'</tbody></table><div class="total-costs"><div class="total-costs-label">Gesamtkosten aller Kunden</div><div class="total-costs-value">{format_euro(gesamt_kosten)}</div></div></div></div><script>function check(){{if(document.getElementById("pw").value==="adagentur2026"){{document.getElementById("login").style.display="none";document.getElementById("dashboard").style.display="block"}}else{{document.getElementById("err").style.display="block"}}}}</script></body></html>'
        
        # Speichern
        with open('index.html', 'w', encoding='utf-8') as f:
            f.write(html)
        
        print("✅ Dashboard generated successfully!")
        EOF
        
    - name: Commit and Push
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add index.html
        git commit -m "Auto-update: $(date '+%Y-%m-%d %H:%M')" || exit 0
        git push
